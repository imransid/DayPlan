name: Build & release Android APK

# Push -> CI builds an APK and publishes it to GitHub Releases as `build-<n>`.
# The installed app checks that release on launch and offers a one-tap update
# (mobile/src/services/appUpdate.ts) — so you never build/sideload manually.
#
# Triggers:
#   - push to main
#   - push a tag  ci-*  or  build-*   (handy for testing from any branch)
#   - manual run from the Actions tab (once this file is on the default branch)
#
# Signing: if the ANDROID_KEYSTORE_* secrets are set, the APK is release-signed;
# otherwise it falls back to the committed debug key (fine for testing — it still
# installs over a debug-signed app). See .github/ANDROID_RELEASE_SETUP.md.
on:
  push:
    branches: [main]
    tags: ['ci-*', 'build-*']
  workflow_dispatch: {}

permissions:
  contents: write # create the Release

concurrency:
  group: android-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install JS dependencies
        run: yarn install --immutable

      - name: Stamp build number into the JS bundle
        run: |
          sed -i "s/export const APP_BUILD = 0;/export const APP_BUILD = ${{ github.run_number }};/" src/appVersion.ts
          grep APP_BUILD src/appVersion.ts

      - name: Prepare signing (optional)
        id: signing
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > android/app/upload.keystore
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "Release keystore configured — APK will be release-signed."
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret — building DEBUG-signed (fine for the first test). Add the keystore secrets for production signing."
          fi

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build release APK
        working-directory: mobile/android
        env:
          DAYPLAN_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          DAYPLAN_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          DAYPLAN_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ARGS="-PdayplanVersionCode=${{ github.run_number }} -PdayplanVersionName=1.0.${{ github.run_number }}"
          if [ "${{ steps.signing.outputs.signed }}" = "true" ]; then
            ARGS="$ARGS -PDAYPLAN_UPLOAD_STORE_FILE=upload.keystore"
            ARGS="$ARGS -PDAYPLAN_UPLOAD_STORE_PASSWORD=$DAYPLAN_STORE_PASSWORD"
            ARGS="$ARGS -PDAYPLAN_UPLOAD_KEY_ALIAS=$DAYPLAN_KEY_ALIAS"
            ARGS="$ARGS -PDAYPLAN_UPLOAD_KEY_PASSWORD=$DAYPLAN_KEY_PASSWORD"
          fi
          ./gradlew assembleRelease --no-daemon $ARGS

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk "dayplan-build-${{ github.run_number }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: DayPlan build ${{ github.run_number }}
          body: |
            Automated build from ${{ github.sha }}.
            Installed apps offer this update on next launch.
            Signing: ${{ steps.signing.outputs.signed == 'true' && 'release key' || 'debug key (test build)' }}
          files: mobile/dayplan-build-${{ github.run_number }}.apk
          make_latest: true
